# Experiment 5 — AuthzForce-backed HTTP auth backend for RabbitMQ.
#
# Authorization decisions are delegated to topic-auth-xacml, which queries the
# same AuthzForce XACML PDP that governs the Kafka transport path via kafka-authz.
# This unified policy projection means a single grant/revoke action in
# ConsumerAuthorization propagates to both AMQP and Kafka enforcement within
# one policy-sync interval.
#
auth_backends.1 = rabbit_auth_backend_http

auth_http.http_method    = post
auth_http.user_path      = http://topic-auth-xacml:9090/auth/user
auth_http.vhost_path     = http://topic-auth-xacml:9090/auth/vhost
auth_http.resource_path  = http://topic-auth-xacml:9090/auth/resource
auth_http.topic_path     = http://topic-auth-xacml:9090/auth/topic
