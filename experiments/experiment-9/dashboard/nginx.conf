server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS resolver so hostnames in proxy_pass variables
    # are resolved per-request (lazy), not at nginx startup. Without this, nginx
    # exits with "host not found in upstream" when backends are not yet running.
    # IMPORTANT: set $upstream must appear BEFORE rewrite — rewrite with break
    # stops processing subsequent set directives in the same rewrite phase.
    resolver 127.0.0.11 valid=5s ipv6=off;

    # ── Core system proxies ──────────────────────────────────────────────────────

    location /api/serviceregistry/ {
        set $upstream http://serviceregistry:8080;
        rewrite ^/api/serviceregistry/(.*) /$1 break;
        proxy_pass         $upstream;
        proxy_set_header   Host serviceregistry:8080;
        proxy_read_timeout 5s;
    }

    location /api/authentication/ {
        set $upstream http://authentication:8081;
        rewrite ^/api/authentication/(.*) /$1 break;
        proxy_pass         $upstream;
        proxy_set_header   Host authentication:8081;
        proxy_read_timeout 5s;
    }

    location /api/consumerauth/ {
        set $upstream http://consumerauth:8082;
        rewrite ^/api/consumerauth/(.*) /$1 break;
        proxy_pass         $upstream;
        proxy_set_header   Host consumerauth:8082;
        proxy_read_timeout 5s;
    }

    location /api/dynamicorch/ {
        set $upstream http://dynamicorch:8083;
        rewrite ^/api/dynamicorch/(.*) /$1 break;
        proxy_pass         $upstream;
        proxy_set_header   Host dynamicorch:8083;
        proxy_read_timeout 5s;
    }

    location /api/profile-ca/ {
        set $upstream http://profile-ca:8087;
        rewrite ^/api/profile-ca/(.*) /$1 break;
        proxy_pass         $upstream;
        proxy_set_header   Host profile-ca:8087;
        proxy_read_timeout 5s;
    }

    # ── Support service proxies ──────────────────────────────────────────────────

    location /api/rabbitmq/ {
        set $upstream http://rabbitmq:15672;
        rewrite ^/api/rabbitmq/(.*) /$1 break;
        proxy_pass         $upstream;
        proxy_set_header   Host rabbitmq:15672;
        proxy_read_timeout 5s;
    }

    location /api/authzforce/ {
        # AuthzForce serves all paths under /authzforce-ce/
        set $upstream http://authzforce:8080;
        rewrite ^/api/authzforce/(.*) /authzforce-ce/$1 break;
        proxy_pass         $upstream;
        proxy_set_header   Host authzforce:8080;
        proxy_read_timeout 5s;
    }

    location /api/policy-sync/ {
        set $upstream http://policy-sync:9105;
        rewrite ^/api/policy-sync/(.*) /$1 break;
        proxy_pass         $upstream;
        proxy_set_header   Host policy-sync:9105;
        proxy_read_timeout 5s;
    }

    location /api/topic-auth-xacml/ {
        set $upstream http://topic-auth-xacml:9090;
        rewrite ^/api/topic-auth-xacml/(.*) /$1 break;
        proxy_pass         $upstream;
        proxy_set_header   Host topic-auth-xacml:9090;
        proxy_read_timeout 5s;
    }

    location /api/kafka-authz/ {
        set $upstream http://kafka-authz:9101;
        rewrite ^/api/kafka-authz/(.*) /$1 break;
        proxy_pass         $upstream;
        proxy_set_header   Host kafka-authz:9101;
        proxy_read_timeout 5s;
        proxy_buffering    off;
        proxy_cache        off;
    }

    location /api/pki-rest-authz/ {
        set $upstream http://pki-rest-authz:9209;
        rewrite ^/api/pki-rest-authz/(.*) /$1 break;
        proxy_pass         $upstream;
        proxy_set_header   Host pki-rest-authz:9209;
        proxy_read_timeout 5s;
    }

    # ── UC3 scenario services ────────────────────────────────────────────────────

    location /api/portal-cloud-ml/ {
        set $upstream http://portal-cloud-ml:9207;
        rewrite ^/api/portal-cloud-ml/(.*) /$1 break;
        proxy_pass         $upstream;
        proxy_set_header   Host portal-cloud-ml:9207;
        proxy_read_timeout 5s;
    }

    location /api/service-partner-1/ {
        set $upstream http://service-partner-1:9201;
        rewrite ^/api/service-partner-1/(.*) /$1 break;
        proxy_pass         $upstream;
        proxy_set_header   Host service-partner-1:9201;
        proxy_read_timeout 5s;
    }

    location /api/service-partner-2/ {
        set $upstream http://service-partner-2:9202;
        rewrite ^/api/service-partner-2/(.*) /$1 break;
        proxy_pass         $upstream;
        proxy_set_header   Host service-partner-2:9202;
        proxy_read_timeout 5s;
    }

    location /api/robot-fleet-site-1/ {
        set $upstream http://robot-fleet-site-1:9003;
        rewrite ^/api/robot-fleet-site-1/(.*) /$1 break;
        proxy_pass         $upstream;
        proxy_set_header   Host robot-fleet-site-1:9003;
        proxy_read_timeout 5s;
    }

    location /api/robot-fleet-site-2/ {
        set $upstream http://robot-fleet-site-2:9003;
        rewrite ^/api/robot-fleet-site-2/(.*) /$1 break;
        proxy_pass         $upstream;
        proxy_set_header   Host robot-fleet-site-2:9003;
        proxy_read_timeout 5s;
    }

    location /api/robot-fleet-site-3/ {
        set $upstream http://robot-fleet-site-3:9003;
        rewrite ^/api/robot-fleet-site-3/(.*) /$1 break;
        proxy_pass         $upstream;
        proxy_set_header   Host robot-fleet-site-3:9003;
        proxy_read_timeout 5s;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
