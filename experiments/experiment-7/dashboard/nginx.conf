server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Core system proxies ──────────────────────────────────────────────────────

    location /api/serviceregistry/ {
        proxy_pass         http://serviceregistry:8080/;
        proxy_set_header   Host serviceregistry:8080;
        proxy_read_timeout 5s;
    }

    location /api/authentication/ {
        proxy_pass         http://authentication:8081/;
        proxy_set_header   Host authentication:8081;
        proxy_read_timeout 5s;
    }

    location /api/consumerauth/ {
        proxy_pass         http://consumerauth:8082/;
        proxy_set_header   Host consumerauth:8082;
        proxy_read_timeout 5s;
    }

    location /api/dynamicorch/ {
        proxy_pass         http://dynamicorch:8083/;
        proxy_set_header   Host dynamicorch:8083;
        proxy_read_timeout 5s;
    }

    location /api/ca/ {
        proxy_pass         http://ca:8086/;
        proxy_set_header   Host ca:8086;
        proxy_read_timeout 5s;
    }

    # ── Support service proxies ──────────────────────────────────────────────────

    # RabbitMQ management API — strips /api/rabbitmq prefix, proxies to internal port 15672.
    location /api/rabbitmq/ {
        proxy_pass         http://rabbitmq:15672/;
        proxy_set_header   Host rabbitmq:15672;
        proxy_read_timeout 5s;
    }

    location /api/authzforce/ {
        proxy_pass         http://authzforce:8080/authzforce-ce/;
        proxy_set_header   Host authzforce:8080;
        proxy_read_timeout 5s;
    }

    location /api/policy-sync/ {
        proxy_pass         http://policy-sync:9095/;
        proxy_set_header   Host policy-sync:9095;
        proxy_read_timeout 5s;
    }

    location /api/topic-auth-xacml/ {
        proxy_pass         http://topic-auth-xacml:9090/;
        proxy_set_header   Host topic-auth-xacml:9090;
        proxy_read_timeout 5s;
    }

    location /api/kafka-authz/ {
        proxy_pass         http://kafka-authz:9091/;
        proxy_set_header   Host kafka-authz:9091;
        proxy_read_timeout 5s;
    }

    # cert-rest-authz: proxy to the plain HTTP health/status port (9099).
    # The mTLS port (9098) requires a client certificate and is not proxied here.
    location /api/cert-rest-authz/ {
        proxy_pass         http://cert-rest-authz:9099/;
        proxy_set_header   Host cert-rest-authz:9099;
        proxy_read_timeout 5s;
    }

    location /api/robot-fleet/ {
        proxy_pass         http://robot-fleet-tls:9003/;
        proxy_set_header   Host robot-fleet-tls:9003;
        proxy_read_timeout 5s;
    }

    location /api/consumer-1/ {
        proxy_pass         http://consumer-1:9002/;
        proxy_set_header   Host consumer-1:9002;
        proxy_read_timeout 5s;
    }

    location /api/consumer-2/ {
        proxy_pass         http://consumer-2:9002/;
        proxy_set_header   Host consumer-2:9002;
        proxy_read_timeout 5s;
    }

    location /api/consumer-3/ {
        proxy_pass         http://consumer-3:9002/;
        proxy_set_header   Host consumer-3:9002;
        proxy_read_timeout 5s;
    }

    location /api/analytics-consumer/ {
        proxy_pass         http://analytics-consumer:9004/;
        proxy_set_header   Host analytics-consumer:9004;
        proxy_read_timeout 5s;
        # SSE support
        proxy_buffering    off;
        proxy_cache        off;
    }

    location /api/cert-consumer/ {
        proxy_pass         http://cert-consumer:9096/;
        proxy_set_header   Host cert-consumer:9096;
        proxy_read_timeout 5s;
    }

    # data-provider-tls runs HTTPS only.
    # The shared /certs volume (written by cert-provisioner) provides ca.crt so that
    # nginx can verify the ephemeral server certificate issued at runtime.
    location /api/data-provider-tls/ {
        proxy_pass                    https://data-provider-tls:9094/;
        proxy_set_header              Host data-provider-tls:9094;
        proxy_read_timeout            5s;
        proxy_ssl_verify              on;
        proxy_ssl_trusted_certificate /certs/ca.crt;
        proxy_ssl_verify_depth        2;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
