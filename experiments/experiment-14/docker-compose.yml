# Experiment 14 — Connection-Time Certificate Revocation Enforcement
#
# Architecture extension from experiment-13:
#   1. Connection-time cert revocation for RabbitMQ (topic-auth-xacml D2'):
#      - handleUser and handleVhost now pre-gate on certValid from PIP BEFORE
#        calling AuthzForce. A revoked cert is rejected at AMQP connection setup,
#        not only at message time. The PDP is never consulted for revoked certs.
#
#   2. Connection-time cert revocation for Kafka (KafkaPrincipalBuilder plugin):
#      - ArrowheadPrincipalBuilder is loaded as a Kafka broker plugin.
#      - After TLS handshake, the broker queries PIP before accepting the connection.
#      - Revoked certs cause AuthenticationException before any Kafka protocol exchange.
#
# This closes the gap identified in experiment-13 where a revoked cert could still
# receive Permit from AuthzForce if a grant policy existed.
#
# Design decisions applied:
#   D1  — No PEP-side caching of PIP responses (revocation propagates instantly)
#   D2' — cert-valid pre-gate at connection time (replaces D2)
#          PIP is checked before PDP; revoked cert = immediate deny
#   D3  — Hard mTLS requirement at broker level (unchanged)
#
# Ports exposed to host (experiment-13 host ports + 100):
#   profile-ca HTTP:              http://localhost:8687
#   profile-ca mTLS:              https://localhost:8688
#   profile-ca gRPC:              localhost:8689
#   AuthzForce:                   http://localhost:8796/authzforce-ce
#   ServiceRegistry TLS:          https://localhost:9090
#   Authentication TLS:           https://localhost:9091
#   ConsumerAuthorization TLS:    https://localhost:9092
#   DynamicOrch-XACML HTTP:       http://localhost:9093
#   authz-pdp gRPC:               localhost:9750
#   PAP:                          http://localhost:9705
#   PIP:                          http://localhost:9706
#   kafka-authz:                  http://localhost:9701
#   pki-rest-authz mTLS:          https://localhost:9708
#   pki-rest-authz HTTP:          http://localhost:9709
#   portal-cloud-ml HTTP:         http://localhost:9707
#   service-partner-1 health:     http://localhost:9711
#   service-partner-2 health:     http://localhost:9712
#   robot-fleet-site-1 control:   http://localhost:9716
#   robot-fleet-site-2 control:   http://localhost:9717
#   robot-fleet-site-3 control:   http://localhost:9718
#   RabbitMQ management:          http://localhost:16179
#   Kafdrop (Kafka UI):           http://localhost:9014
#   Dashboard (monitoring):       http://localhost:3014

services:

  # ── profile-ca — Arrowhead 5.2 Local Cloud CA + CertificateLifecycle gRPC ──────

  profile-ca:
    build:
      context: ../../
      dockerfile: experiments/experiment-14/dockerfiles/profile-ca.Dockerfile
    environment:
      PORT: "8087"
      TLS_PORT: "8088"
      GRPC_PORT: "8089"
      CA_KEY_FILE: "/data/ca.key"
    volumes:
      - profile-ca-data:/data
    ports:
      - "8687:8087"
      - "8688:8088"
      - "8689:8089"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8087/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── cert-provisioner ─────────────────────────────────────────────────────────

  cert-provisioner:
    build:
      context: ../../
      dockerfile: experiments/experiment-14/dockerfiles/cert-provisioner.Dockerfile
    environment:
      CA_URL: "http://profile-ca:8087"
      CERTS_DIR: "/certs"
    volumes:
      - certs:/certs
    depends_on:
      profile-ca:
        condition: service_healthy
    restart: "no"

  # ── Infrastructure ────────────────────────────────────────────────────────────

  rabbitmq:
    # mTLS client certs required. Cert CN = AMQP username.
    # topic-auth-xacml now pre-gates on certValid from PIP before calling AuthzForce.
    image: rabbitmq:3.13-management-alpine
    ports:
      - "16179:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
      - certs:/certs:ro
    depends_on:
      cert-provisioner:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 15

  authzforce:
    build:
      context: ../../
      dockerfile: experiments/experiment-14/dockerfiles/authzforce-server.Dockerfile
    ports:
      - "8796:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    # ssl.client.auth=required + ArrowheadPrincipalBuilder plugin.
    # After TLS handshake, the plugin queries PIP. Revoked certs are rejected
    # at the TCP connection level — before any Kafka protocol exchange.
    build:
      context: ../../
      dockerfile: experiments/experiment-14/dockerfiles/kafka-tls.Dockerfile
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: SSL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: SSL://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: SSL
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: SSL:SSL,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "NkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_SSL_CLIENT_AUTH: required
      KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""
      CERT_DIR: /certs
      KAFKA_KEYSTORE_PASS: kafkapass123
      # PIP URL for ArrowheadPrincipalBuilder plugin (passed via KAFKA_OPTS in entrypoint)
      ARROWHEAD_PIP_URL: "http://pip:9506"
    volumes:
      - certs:/certs:ro
    depends_on:
      cert-provisioner:
        condition: service_completed_successfully
      pip:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "printf '' > /dev/tcp/localhost/9092 2>/dev/null && echo ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ── Arrowhead Core Systems ────────────────────────────────────────────────────

  serviceregistry:
    build:
      context: ../../core
      dockerfile: ../experiments/experiment-14/dockerfiles/core.Dockerfile
      args:
        CMD: serviceregistry
    environment:
      PORT: "8080"
      TLS_PORT: "8490"
      TLS_CERT_FILE: "/certs/serviceregistry.crt"
      TLS_KEY_FILE:  "/certs/serviceregistry.key"
      TLS_CA_FILE:   "/certs/ca.crt"
      DB_PATH: "/data/serviceregistry.db"
    ports:
      - "9090:8490"
    volumes:
      - certs:/certs:ro
      - serviceregistry-data:/data
    depends_on:
      cert-provisioner:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  authentication:
    build:
      context: ../../core
      dockerfile: ../experiments/experiment-14/dockerfiles/core.Dockerfile
      args:
        CMD: authentication
    environment:
      PORT: "8081"
      TLS_PORT: "8491"
      TLS_CERT_FILE: "/certs/authentication.crt"
      TLS_KEY_FILE:  "/certs/authentication.key"
      TLS_CA_FILE:   "/certs/ca.crt"
      DB_PATH: "/data/authentication.db"
    ports:
      - "9091:8491"
    volumes:
      - certs:/certs:ro
      - authentication-data:/data
    depends_on:
      cert-provisioner:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  consumerauth:
    build:
      context: ../../core
      dockerfile: ../experiments/experiment-14/dockerfiles/core.Dockerfile
      args:
        CMD: consumerauth
    environment:
      PORT: "8082"
      TLS_PORT: "8492"
      TLS_CERT_FILE: "/certs/consumerauth.crt"
      TLS_KEY_FILE:  "/certs/consumerauth.key"
      TLS_CA_FILE:   "/certs/ca.crt"
      DB_PATH: "/data/consumerauth.db"
    ports:
      - "9092:8492"
    volumes:
      - certs:/certs:ro
      - consumerauth-data:/data
    depends_on:
      cert-provisioner:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── authz-pdp — AuthorizationPDP gRPC service ────────────────────────────────

  authz-pdp:
    build:
      context: ../../
      dockerfile: experiments/experiment-14/dockerfiles/authz-pdp.Dockerfile
    environment:
      AUTHZFORCE_URL: "http://authzforce:8080/authzforce-ce"
      AUTHZFORCE_DOMAIN: "arrowhead-exp14"
      PORT: "9550"
    ports:
      - "9750:9550"
    depends_on:
      authzforce:
        condition: service_healthy
      pap:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9550 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── DynamicOrchestration-XACML ────────────────────────────────────────────────

  dynamicorch-xacml:
    build:
      context: ../../
      dockerfile: experiments/experiment-14/dockerfiles/dynamicorch-xacml.Dockerfile
    environment:
      SR_URL: "http://serviceregistry:8080"
      AUTH_BACKEND: "grpc"
      AUTHZ_PDP_ADDR: "authz-pdp:9550"
      CA_URL: "http://consumerauth:8082"
      ENABLE_AUTH: "true"
      PORT: "8083"
    ports:
      - "9093:8083"
    depends_on:
      authz-pdp:
        condition: service_healthy
      serviceregistry:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/status || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── PAP — Policy Administration Point ────────────────────────────────────────

  pap:
    build:
      context: ../../
      dockerfile: experiments/experiment-14/dockerfiles/pap.Dockerfile
    environment:
      AUTHZFORCE_URL: "http://authzforce:8080/authzforce-ce"
      AUTHZFORCE_DOMAIN: "arrowhead-exp14"
      PORT: "9505"
    ports:
      - "9705:9505"
    depends_on:
      authzforce:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9505/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── PIP — Policy Information Point (auto-populated via gRPC stream) ───────────

  pip:
    build:
      context: ../../
      dockerfile: experiments/experiment-14/dockerfiles/pip.Dockerfile
    environment:
      PORT: "9506"
      PROFILE_CA_GRPC_ADDR: "profile-ca:8089"
    ports:
      - "9706:9506"
    depends_on:
      profile-ca:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9506/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Seeds XACML policies. PIP is auto-populated by the profile-ca gRPC stream.

  setup:
    image: curlimages/curl:8.7.1
    depends_on:
      pap:
        condition: service_healthy
      pip:
        condition: service_healthy
      authentication:
        condition: service_healthy
    restart: "no"
    command:
      - sh
      - -c
      - |-
        # Register robot-fleet system identities so they can log in to the Authentication service.
        curl -s -X POST http://authentication:8081/authentication/mgmt/identities \
          -H 'Content-Type: application/json' \
          -d '{"authenticationMethod":"PASSWORD","identities":[{"systemName":"robot-fleet-site-1","credentials":{"password":"fleet-secret"}},{"systemName":"robot-fleet-site-2","credentials":{"password":"fleet-secret"}},{"systemName":"robot-fleet-site-3","credentials":{"password":"fleet-secret"}}]}' \
          | grep -q '"identities"' &&
        # Per-provider orchestration policies (action=orchestrate)
        curl -s -X POST http://pap:9505/policies -H 'Content-Type: application/json' \
          -d '{"subject":"portal-cloud-ml","resource":"telemetry","provider":"robot-fleet-site-1","action":"orchestrate","effect":"Permit"}' | grep -q '"id"' &&
        curl -s -X POST http://pap:9505/policies -H 'Content-Type: application/json' \
          -d '{"subject":"portal-cloud-ml","resource":"telemetry","provider":"robot-fleet-site-2","action":"orchestrate","effect":"Permit"}' | grep -q '"id"' &&
        curl -s -X POST http://pap:9505/policies -H 'Content-Type: application/json' \
          -d '{"subject":"portal-cloud-ml","resource":"telemetry","provider":"robot-fleet-site-3","action":"orchestrate","effect":"Permit"}' | grep -q '"id"' &&
        curl -s -X POST http://pap:9505/policies -H 'Content-Type: application/json' \
          -d '{"subject":"service-partner-1","resource":"telemetry-rest","provider":"portal-cloud-ml","action":"orchestrate","effect":"Permit"}' | grep -q '"id"' &&
        curl -s -X POST http://pap:9505/policies -H 'Content-Type: application/json' \
          -d '{"subject":"service-partner-2","resource":"telemetry-rest","provider":"portal-cloud-ml","action":"orchestrate","effect":"Permit"}' | grep -q '"id"' &&
        curl -s -X POST http://pap:9505/policies -H 'Content-Type: application/json' \
          -d '{"subject":"test-probe","resource":"telemetry-rest","provider":"portal-cloud-ml","action":"orchestrate","effect":"Permit"}' | grep -q '"id"' &&
        curl -s -X POST http://pap:9505/policies -H 'Content-Type: application/json' \
          -d '{"subject":"test-probe","resource":"telemetry","provider":"robot-fleet-site-1","action":"orchestrate","effect":"Permit"}' | grep -q '"id"' &&
        # Service-level enforcement policies (action=consume)
        curl -s -X POST http://pap:9505/policies -H 'Content-Type: application/json' \
          -d '{"subject":"portal-cloud-ml","resource":"telemetry","action":"consume","effect":"Permit"}' | grep -q '"id"' &&
        curl -s -X POST http://pap:9505/policies -H 'Content-Type: application/json' \
          -d '{"subject":"service-partner-1","resource":"telemetry-rest","action":"consume","effect":"Permit"}' | grep -q '"id"' &&
        curl -s -X POST http://pap:9505/policies -H 'Content-Type: application/json' \
          -d '{"subject":"service-partner-2","resource":"telemetry-rest","action":"consume","effect":"Permit"}' | grep -q '"id"' &&
        curl -s -X POST http://pap:9505/policies -H 'Content-Type: application/json' \
          -d '{"subject":"test-probe","resource":"telemetry-rest","action":"consume","effect":"Permit"}' | grep -q '"id"' &&
        curl -s -X POST http://pap:9505/policies -H 'Content-Type: application/json' \
          -d '{"subject":"test-probe","resource":"telemetry","action":"consume","effect":"Permit"}' | grep -q '"id"'
        # NOTE: No manual PIP subject registration — PIP is auto-populated via
        # the profile-ca gRPC CertificateLifecycle stream.

  # ── AMQP Enforcement ─────────────────────────────────────────────────────────
  # topic-auth-xacml (exp-14) pre-gates on certValid from PIP before AuthzForce.
  # A revoked cert is rejected at /auth/user and /auth/vhost without PDP call.

  topic-auth-xacml:
    build:
      context: ../../
      dockerfile: experiments/experiment-14/dockerfiles/topic-auth-xacml.Dockerfile
    environment:
      AUTHZFORCE_URL: "http://authzforce:8080/authzforce-ce"
      AUTHZFORCE_DOMAIN: "arrowhead-exp14"
      RABBITMQ_ADMIN_USER: admin
      RABBITMQ_ADMIN_PASS: admin
      CONSUMER_PASSWORD: "consumer-secret"
      PUBLISHER_USER: "robot-fleet"
      PUBLISHER_PASSWORD: "fleet-secret"
      CACHE_TTL: "0s"
      PORT: "9090"
      PIP_URL: "http://pip:9506"
    depends_on:
      rabbitmq:
        condition: service_healthy
      pap:
        condition: service_healthy
      pip:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Kafka Enforcement ─────────────────────────────────────────────────────────
  # Kafka: connection-time enforcement via ArrowheadPrincipalBuilder (D2').
  # kafka-authz: message-level enforcement continues to operate as in exp-13.

  kafka-authz:
    build:
      context: ../../
      dockerfile: experiments/experiment-14/dockerfiles/kafka-authz.Dockerfile
    environment:
      KAFKA_BROKERS: "kafka:9092"
      AUTHZFORCE_URL: "http://authzforce:8080/authzforce-ce"
      AUTHZFORCE_DOMAIN: "arrowhead-exp14"
      PORT: "9101"
      CA_URL: "http://profile-ca:8087"
      PIP_URL: "http://pip:9506"
    ports:
      - "9701:9101"
    depends_on:
      kafka:
        condition: service_healthy
      pap:
        condition: service_healthy
      pip:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
      profile-ca:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9101/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Portal & Cloud ML ─────────────────────────────────────────────────────────

  portal-cloud-ml:
    build:
      context: ../../
      dockerfile: experiments/experiment-14/dockerfiles/portal-cloud-ml.Dockerfile
    environment:
      CA_URL: "http://profile-ca:8087"
      CA_TLS_URL: "https://profile-ca:8088"
      KAFKA_AUTHZ_URL: "http://kafka-authz:9101"
      CONSUMER_NAME: "portal-cloud-ml"
      SERVICE: "telemetry"
      SYSTEM_NAME: "portal-cloud-ml"
      PORT: "9207"
      TLS_PORT: "9294"
    ports:
      - "9707:9207"
    depends_on:
      kafka-authz:
        condition: service_healthy
      profile-ca:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9207/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 15s

  # ── REST mTLS Enforcement ─────────────────────────────────────────────────────

  pki-rest-authz:
    build:
      context: ../../
      dockerfile: experiments/experiment-14/dockerfiles/pki-rest-authz.Dockerfile
    environment:
      AUTHZFORCE_URL: "http://authzforce:8080/authzforce-ce"
      AUTHZFORCE_DOMAIN: "arrowhead-exp14"
      UPSTREAM_URL: "https://portal-cloud-ml:9294"
      PORT: "9209"
      TLS_PORT: "9208"
      PIP_URL: "http://pip:9506"
    ports:
      - "9708:9208"
      - "9709:9209"
    depends_on:
      portal-cloud-ml:
        condition: service_healthy
      pap:
        condition: service_healthy
      pip:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
      profile-ca:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9209/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Robot Fleet Sites ─────────────────────────────────────────────────────────

  robot-fleet-site-1:
    build:
      context: ../../
      dockerfile: experiments/experiment-14/dockerfiles/robot-fleet-tls.Dockerfile
    restart: on-failure
    ports:
      - "9716:9003"
    environment:
      AMQP_URL: "amqps://robot-fleet-site-1:fleet-secret@rabbitmq:5671/"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_TOPIC: "arrowhead.telemetry"
      INITIAL_ROBOT_COUNT: "2"
      PAYLOAD_TYPE: "imu"
      PAYLOAD_HZ: "5"
      NETWORK_PRESET: "5g_good"
      FLEET_PORT: "9003"
      SR_URL: "https://serviceregistry:8490"
      SYSTEM_NAME: "robot-fleet-site-1"
      SYSTEM_CREDENTIALS: "fleet-secret"
      AUTH_URL: "https://authentication:8491"
      CA_URL: "http://profile-ca:8087"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9003/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    depends_on:
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy
      topic-auth-xacml:
        condition: service_healthy
      serviceregistry:
        condition: service_healthy
      authentication:
        condition: service_healthy
      profile-ca:
        condition: service_healthy

  robot-fleet-site-2:
    build:
      context: ../../
      dockerfile: experiments/experiment-14/dockerfiles/robot-fleet-tls.Dockerfile
    restart: on-failure
    ports:
      - "9717:9003"
    environment:
      AMQP_URL: "amqps://robot-fleet-site-2:fleet-secret@rabbitmq:5671/"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_TOPIC: "arrowhead.telemetry"
      INITIAL_ROBOT_COUNT: "2"
      PAYLOAD_TYPE: "imu"
      PAYLOAD_HZ: "5"
      NETWORK_PRESET: "5g_good"
      FLEET_PORT: "9003"
      SR_URL: "https://serviceregistry:8490"
      SYSTEM_NAME: "robot-fleet-site-2"
      SYSTEM_CREDENTIALS: "fleet-secret"
      AUTH_URL: "https://authentication:8491"
      CA_URL: "http://profile-ca:8087"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9003/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    depends_on:
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy
      topic-auth-xacml:
        condition: service_healthy
      serviceregistry:
        condition: service_healthy
      authentication:
        condition: service_healthy
      profile-ca:
        condition: service_healthy

  robot-fleet-site-3:
    build:
      context: ../../
      dockerfile: experiments/experiment-14/dockerfiles/robot-fleet-tls.Dockerfile
    restart: on-failure
    ports:
      - "9718:9003"
    environment:
      AMQP_URL: "amqps://robot-fleet-site-3:fleet-secret@rabbitmq:5671/"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_TOPIC: "arrowhead.telemetry"
      INITIAL_ROBOT_COUNT: "2"
      PAYLOAD_TYPE: "imu"
      PAYLOAD_HZ: "5"
      NETWORK_PRESET: "5g_good"
      FLEET_PORT: "9003"
      SR_URL: "https://serviceregistry:8490"
      SYSTEM_NAME: "robot-fleet-site-3"
      SYSTEM_CREDENTIALS: "fleet-secret"
      AUTH_URL: "https://authentication:8491"
      CA_URL: "http://profile-ca:8087"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9003/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    depends_on:
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy
      topic-auth-xacml:
        condition: service_healthy
      serviceregistry:
        condition: service_healthy
      authentication:
        condition: service_healthy
      profile-ca:
        condition: service_healthy

  # ── Service Partners (SP1, SP2) ───────────────────────────────────────────────

  service-partner-1:
    build:
      context: ../../
      dockerfile: experiments/experiment-14/dockerfiles/service-partner.Dockerfile
    environment:
      PARTNER_NAME: "service-partner-1"
      CA_URL: "http://profile-ca:8087"
      CA_TLS_URL: "https://profile-ca:8088"
      PKI_REST_AUTHZ_URL: "https://pki-rest-authz:9208"
      SERVICE: "telemetry-rest"
      POLL_INTERVAL: "5s"
      HEALTH_PORT: "9201"
    ports:
      - "9711:9201"
    depends_on:
      pki-rest-authz:
        condition: service_healthy
      profile-ca:
        condition: service_healthy

  service-partner-2:
    build:
      context: ../../
      dockerfile: experiments/experiment-14/dockerfiles/service-partner.Dockerfile
    environment:
      PARTNER_NAME: "service-partner-2"
      CA_URL: "http://profile-ca:8087"
      CA_TLS_URL: "https://profile-ca:8088"
      PKI_REST_AUTHZ_URL: "https://pki-rest-authz:9208"
      SERVICE: "telemetry-rest"
      POLL_INTERVAL: "5s"
      HEALTH_PORT: "9202"
    ports:
      - "9712:9202"
    depends_on:
      pki-rest-authz:
        condition: service_healthy
      profile-ca:
        condition: service_healthy

  # ── Kafdrop — Kafka web UI ────────────────────────────────────────────────────

  kafdrop:
    build:
      context: ../../
      dockerfile: experiments/experiment-14/dockerfiles/kafdrop.Dockerfile
    ports:
      - "9014:9000"
    environment:
      CERTS_DIR: /certs
    volumes:
      - certs:/certs:ro
    depends_on:
      kafka:
        condition: service_healthy
      cert-provisioner:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/actuator/health 2>/dev/null | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Dashboard ─────────────────────────────────────────────────────────────────

  dashboard:
    build:
      context: ../../
      dockerfile: experiments/experiment-14/dockerfiles/dashboard.Dockerfile
    ports:
      - "3014:80"
    depends_on:
      cert-provisioner:
        condition: service_completed_successfully

volumes:
  certs:
  profile-ca-data:
  serviceregistry-data:
  authentication-data:
  consumerauth-data:
