# Experiment-13 — RabbitMQ with mTLS client certificate authentication.
#
# Key changes from experiment-12:
#   - verify_peer + fail_if_no_peer_cert: clients MUST present a valid cert signed
#     by the Arrowhead CA. No cert → connection rejected at the TLS layer.
#   - Clients set their AMQP username to their cert CN so topic-auth-xacml can
#     use the verified cert identity for XACML authorization decisions.
#   - rabbit_auth_backend_http handles both authentication and authorization:
#     publishers authenticate with the shared publisher password;
#     consumers authenticate with the shared consumer password and are
#     authorized per XACML policy using their cert CN as subject.
#
# Note: rabbit_auth_backend_certificate is intentionally NOT used. It caused
# "internal error" in RabbitMQ 3.13-management-alpine. TLS-layer verification
# (fail_if_no_peer_cert) already guarantees the cert is valid; the HTTP backend
# enforces authorization on top of that.

auth_backends.1 = rabbit_auth_backend_http

auth_http.http_method    = post
auth_http.user_path      = http://topic-auth-xacml:9090/auth/user
auth_http.vhost_path     = http://topic-auth-xacml:9090/auth/vhost
auth_http.resource_path  = http://topic-auth-xacml:9090/auth/resource
auth_http.topic_path     = http://topic-auth-xacml:9090/auth/topic

# TLS listener on port 5671
listeners.ssl.default = 5671

ssl_options.cacertfile             = /certs/ca.crt
ssl_options.certfile               = /certs/rabbitmq.crt
ssl_options.keyfile                = /certs/rabbitmq.key
ssl_options.verify                 = verify_peer
ssl_options.fail_if_no_peer_cert   = true
