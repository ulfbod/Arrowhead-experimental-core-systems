# Chain two authorization backends:
#   1. internal  — handles authn (password) and regular resource authz
#                  (vhost access, queue/exchange configure/read/write).
#   2. rabbit_auth_backend_topic — enforces routing key patterns on topic
#                  exchange bind/publish; returns "not applicable" for all
#                  non-topic operations, letting internal handle them.
#
# This means: guest/guest can still log into the management UI (internal
# allows it), but queue binds on the arrowhead topic exchange are also
# checked against the per-user topic permissions synced by topic-auth-sync.
auth_backends.1 = rabbit_auth_backend_internal
auth_backends.2 = rabbit_auth_backend_topic
