server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/<prefix>/ to the correct backend container.
    # Trailing slash on both location and proxy_pass causes nginx to strip the
    # matching prefix before forwarding — /api/sr/serviceregistry/query becomes
    # /serviceregistry/query on serviceregistry:8080.

    location /api/rabbitmq/ {
        proxy_pass         http://rabbitmq:15672/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    location /api/consumerauth/ {
        proxy_pass         http://consumerauth:8082/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    location /api/dynamicorch/ {
        proxy_pass         http://dynamicorch:8083/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    location /api/ca/ {
        proxy_pass         http://ca:8086/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    location /api/sr/ {
        proxy_pass         http://serviceregistry:8080/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    location /api/telemetry/ {
        proxy_pass         http://edge-adapter:9001/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    location /api/robot-sim/ {
        proxy_pass         http://robot-simulator:9003/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    location /api/consumer/ {
        proxy_pass         http://consumer:9002/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # SPA fallback — all unmatched paths serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
