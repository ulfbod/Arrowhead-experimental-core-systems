# Experiment 2 — Virtual Arrowhead Local Cloud with AMQP data plane.
#
# Starts:
#   - RabbitMQ message broker
#   - Arrowhead core systems (ServiceRegistry, Authentication, ConsumerAuthorization,
#     DynamicOrchestration, CA)
#   - Experiment services (robot-fleet, edge-adapter, consumer ×3)
#
# Usage:
#   docker compose up --build
#
# Core system ports are NOT bound to the host to avoid conflicts with any
# locally running Arrowhead services.  Only the ports useful for manual
# inspection are exposed:
#   - RabbitMQ management UI: http://localhost:15672  (guest/guest)
#   - edge-adapter telemetry:  http://localhost:9001/telemetry/latest
#   - robot-fleet control API: http://localhost:9003/config

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "15672:15672"   # management UI only; AMQP stays internal
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Arrowhead Core Systems ───────────────────────────────────────────────────
  # No host port bindings — containers reach each other by service name.

  serviceregistry:
    build:
      context: ../../core
      dockerfile: ../experiments/experiment-2/dockerfiles/core.Dockerfile
      args:
        CMD: serviceregistry
    environment:
      PORT: "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  authentication:
    build:
      context: ../../core
      dockerfile: ../experiments/experiment-2/dockerfiles/core.Dockerfile
      args:
        CMD: authentication
    environment:
      PORT: "8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  consumerauth:
    build:
      context: ../../core
      dockerfile: ../experiments/experiment-2/dockerfiles/core.Dockerfile
      args:
        CMD: consumerauth
    environment:
      PORT: "8082"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  ca:
    build:
      context: ../../core
      dockerfile: ../experiments/experiment-2/dockerfiles/core.Dockerfile
      args:
        CMD: ca
    environment:
      PORT: "8086"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  dynamicorch:
    build:
      context: ../../core
      dockerfile: ../experiments/experiment-2/dockerfiles/core.Dockerfile
      args:
        CMD: dynamicorch
    environment:
      PORT: "8083"
      SERVICE_REGISTRY_URL: "http://serviceregistry:8080"
      CONSUMER_AUTH_URL: "http://consumerauth:8082"
      AUTH_SYSTEM_URL: "http://authentication:8081"
      ENABLE_IDENTITY_CHECK: "false"
      ENABLE_AUTH: "true"
    depends_on:
      serviceregistry:
        condition: service_healthy
      consumerauth:
        condition: service_healthy
      ca:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Seeds ConsumerAuthorization grants for all three consumers.
  # Runs once and exits; consumer services depend on it completing.
  setup:
    image: curlimages/curl:8.7.1
    depends_on:
      consumerauth:
        condition: service_healthy
    restart: "no"
    command:
      - sh
      - -c
      - |-
        curl -sf -X POST http://consumerauth:8082/authorization/grant -H 'Content-Type: application/json' -d '{"consumerSystemName":"demo-consumer","providerSystemName":"edge-adapter","serviceDefinition":"telemetry"}' &&
        curl -sf -X POST http://consumerauth:8082/authorization/grant -H 'Content-Type: application/json' -d '{"consumerSystemName":"demo-consumer-2","providerSystemName":"edge-adapter","serviceDefinition":"telemetry"}' &&
        curl -sf -X POST http://consumerauth:8082/authorization/grant -H 'Content-Type: application/json' -d '{"consumerSystemName":"demo-consumer-3","providerSystemName":"edge-adapter","serviceDefinition":"telemetry"}'

  # ── Experiment Services ──────────────────────────────────────────────────────

  robot-fleet:
    build:
      context: ../../
      dockerfile: experiments/experiment-2/dockerfiles/robot-fleet.Dockerfile
    ports:
      - "9003:9003"   # fleet control API — POST /config to reconfigure robots
    environment:
      AMQP_URL: "amqp://guest:guest@rabbitmq:5672/"
      INITIAL_ROBOT_COUNT: "3"
      PAYLOAD_TYPE: "imu"
      PAYLOAD_HZ: "10"
      NETWORK_PRESET: "5g_good"
      FLEET_PORT: "9003"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9003/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      rabbitmq:
        condition: service_healthy

  edge-adapter:
    build:
      context: ../../
      dockerfile: experiments/experiment-2/dockerfiles/edge-adapter.Dockerfile
    environment:
      AMQP_URL: "amqp://guest:guest@rabbitmq:5672/"
      CA_URL: "http://ca:8086"
      SR_URL: "http://serviceregistry:8080"
      PORT: "9001"
    ports:
      - "9001:9001"   # exposed for manual inspection
    depends_on:
      rabbitmq:
        condition: service_healthy
      serviceregistry:
        condition: service_healthy
      ca:
        condition: service_healthy

  consumer:
    build:
      context: ../../
      dockerfile: experiments/experiment-2/dockerfiles/consumer.Dockerfile
    environment:
      ORCH_URL: "http://dynamicorch:8083"
      CONSUMER_NAME: "demo-consumer"
      POLL_INTERVAL: "5s"
      HEALTH_PORT: "9002"
    depends_on:
      dynamicorch:
        condition: service_healthy
      edge-adapter:
        condition: service_started
      setup:
        condition: service_completed_successfully

  consumer-2:
    build:
      context: ../../
      dockerfile: experiments/experiment-2/dockerfiles/consumer.Dockerfile
    environment:
      ORCH_URL: "http://dynamicorch:8083"
      CONSUMER_NAME: "demo-consumer-2"
      POLL_INTERVAL: "5s"
      HEALTH_PORT: "9004"
    depends_on:
      dynamicorch:
        condition: service_healthy
      edge-adapter:
        condition: service_started
      setup:
        condition: service_completed_successfully

  consumer-3:
    build:
      context: ../../
      dockerfile: experiments/experiment-2/dockerfiles/consumer.Dockerfile
    environment:
      ORCH_URL: "http://dynamicorch:8083"
      CONSUMER_NAME: "demo-consumer-3"
      POLL_INTERVAL: "5s"
      HEALTH_PORT: "9005"
    depends_on:
      dynamicorch:
        condition: service_healthy
      edge-adapter:
        condition: service_started
      setup:
        condition: service_completed_successfully

  # ── Dashboard ────────────────────────────────────────────────────────────────

  dashboard:
    build:
      context: ../../
      dockerfile: experiments/experiment-2/dockerfiles/dashboard.Dockerfile
    ports:
      - "3002:80"   # open http://localhost:3002 in your browser
    depends_on:
      serviceregistry:
        condition: service_healthy
      consumerauth:
        condition: service_healthy
      dynamicorch:
        condition: service_healthy
      ca:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      edge-adapter:
        condition: service_started
      robot-fleet:
        condition: service_healthy
