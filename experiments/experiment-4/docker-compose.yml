# Experiment 4 — Full AHC integration: SR + Auth + ConsumerAuth + DO + CA + topic-auth-http.
#
# Authorization enforced at two independent layers:
#   1. DynamicOrchestration gate (refuses endpoint if grant absent or identity invalid)
#   2. RabbitMQ HTTP authz backend (live CA check on every broker operation; no sync delay)
#
# RabbitMQ uses a single HTTP auth backend:
#   auth_backends.1 = rabbit_auth_backend_http
#   topic-auth-http handles ALL auth decisions (user credentials, vhost, resource, topic).
#   No internal RabbitMQ users — authentication is delegated entirely to topic-auth-http.
#
# Ports exposed to host:
#   Dashboard:               http://localhost:3004
#   RabbitMQ management UI:  http://localhost:15674  (admin/admin)
#   robot-fleet control API: http://localhost:9104/config
#   ServiceRegistry:         http://localhost:8080
#   Authentication:          http://localhost:8081
#   ConsumerAuthorization:   http://localhost:8082
#   DynamicOrchestration:    http://localhost:8083
#   CertificateAuthority:    http://localhost:8086  (Phase 5 — mTLS not yet implemented)

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "15674:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Arrowhead Core Systems ──────────────────────────────────────────────────────────

  serviceregistry:
    build:
      context: ../../core
      dockerfile: ../experiments/experiment-4/dockerfiles/core.Dockerfile
      args:
        CMD: serviceregistry
    environment:
      PORT: "8080"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  authentication:
    build:
      context: ../../core
      dockerfile: ../experiments/experiment-4/dockerfiles/core.Dockerfile
      args:
        CMD: authentication
    environment:
      PORT: "8081"
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  consumerauth:
    build:
      context: ../../core
      dockerfile: ../experiments/experiment-4/dockerfiles/core.Dockerfile
      args:
        CMD: consumerauth
    environment:
      PORT: "8082"
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  dynamicorch:
    build:
      context: ../../core
      dockerfile: ../experiments/experiment-4/dockerfiles/core.Dockerfile
      args:
        CMD: dynamicorch
    environment:
      PORT: "8083"
      SERVICE_REGISTRY_URL: "http://serviceregistry:8080"
      CONSUMER_AUTH_URL: "http://consumerauth:8082"
      AUTH_SYSTEM_URL: "http://authentication:8081"
      ENABLE_AUTH: "true"
      ENABLE_IDENTITY_CHECK: "true"
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      serviceregistry:
        condition: service_healthy
      consumerauth:
        condition: service_healthy
      authentication:
        condition: service_healthy

  ca:
    build:
      context: ../../core
      dockerfile: ../experiments/experiment-4/dockerfiles/core.Dockerfile
      args:
        CMD: ca
    environment:
      PORT: "8086"
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Seeds authorization grants for the 3 direct consumers.
  # grant() retries up to 5 times with a 2 s back-off so a transient CA hiccup
  # (or a re-run after a previously failed container) never leaves setup stuck.
  setup:
    image: curlimages/curl:8.7.1
    depends_on:
      consumerauth:
        condition: service_healthy
    restart: "no"
    command:
      - sh
      - -c
      - |-
        grant() {
          n=0
          until curl -sf -X POST http://consumerauth:8082/authorization/grant \
            -H 'Content-Type: application/json' -d "$1" \
            | grep -qE '"id":|already exists'; do
            n=$((n+1)); [ $n -lt 5 ] || return 1; sleep 2
          done
        }
        grant '{"consumerSystemName":"demo-consumer-1","providerSystemName":"robot-fleet","serviceDefinition":"telemetry"}' &&
        grant '{"consumerSystemName":"demo-consumer-2","providerSystemName":"robot-fleet","serviceDefinition":"telemetry"}' &&
        grant '{"consumerSystemName":"demo-consumer-3","providerSystemName":"robot-fleet","serviceDefinition":"telemetry"}'

  # ── Topic Auth HTTP ────────────────────────────────────────────────────────────────
  #
  # Single HTTP auth backend for RabbitMQ. Handles all auth decisions live:
  #   /auth/user   — validates credentials (admin, publisher, or consumer with CA grant)
  #   /auth/vhost  — checks CA grant for consumers; always allows admin + publisher
  #   /auth/resource — allows all (fine-grained control at topic level)
  #   /auth/topic  — checks CA grant on every publish (write) and bind (read)

  topic-auth-http:
    build:
      context: ../../
      dockerfile: experiments/experiment-4/dockerfiles/topic-auth-http.Dockerfile
    environment:
      CONSUMERAUTH_URL: "http://consumerauth:8082"
      RABBITMQ_ADMIN_USER: admin
      RABBITMQ_ADMIN_PASS: admin   # must match RABBITMQ_DEFAULT_PASS; used by /auth/user to issue management tags
      CONSUMER_PASSWORD: "consumer-secret"
      PUBLISHER_USER: "robot-fleet"
      PUBLISHER_PASSWORD: "fleet-secret"
      # CACHE_TTL: how long CA responses are cached between auth checks.
      # Default 0s = live check on every operation (maximum revocation speed).
      CACHE_TTL: "0s"
      PORT: "9090"
      AUTH_URL: "http://authentication:8081"
      SYSTEM_NAME: "topic-auth-http"
      SYSTEM_CREDENTIALS: "sync-secret"
    depends_on:
      rabbitmq:
        condition: service_healthy
      consumerauth:
        condition: service_healthy
      authentication:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Experiment Services ─────────────────────────────────────────────────────────

  robot-fleet:
    build:
      context: ../../
      dockerfile: experiments/experiment-4/dockerfiles/robot-fleet.Dockerfile
    restart: on-failure
    ports:
      - "9104:9003"
    environment:
      AMQP_URL: "amqp://robot-fleet:fleet-secret@rabbitmq:5672/"
      INITIAL_ROBOT_COUNT: "3"
      PAYLOAD_TYPE: "imu"
      PAYLOAD_HZ: "10"
      NETWORK_PRESET: "5g_good"
      FLEET_PORT: "9003"
      SR_URL: "http://serviceregistry:8080"
      SYSTEM_NAME: "robot-fleet"
      SYSTEM_CREDENTIALS: "fleet-secret"
      AUTH_URL: "http://authentication:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9003/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      rabbitmq:
        condition: service_healthy
      topic-auth-http:
        condition: service_healthy
      serviceregistry:
        condition: service_healthy
      authentication:
        condition: service_healthy

  consumer-1:
    build:
      context: ../../
      dockerfile: experiments/experiment-4/dockerfiles/consumer-direct.Dockerfile
    environment:
      CONSUMER_NAME: "demo-consumer-1"
      SYSTEM_CREDENTIALS: "consumer-secret"
      CONSUMER_PASSWORD: "consumer-secret"
      AUTH_URL: "http://authentication:8081"
      ORCHESTRATION_URL: "http://dynamicorch:8083"
      CONSUMERAUTH_URL: "http://consumerauth:8082"
      HEALTH_PORT: "9002"
    depends_on:
      topic-auth-http:
        condition: service_healthy
      dynamicorch:
        condition: service_healthy
      robot-fleet:
        condition: service_healthy

  consumer-2:
    build:
      context: ../../
      dockerfile: experiments/experiment-4/dockerfiles/consumer-direct.Dockerfile
    environment:
      CONSUMER_NAME: "demo-consumer-2"
      SYSTEM_CREDENTIALS: "consumer-secret"
      CONSUMER_PASSWORD: "consumer-secret"
      AUTH_URL: "http://authentication:8081"
      ORCHESTRATION_URL: "http://dynamicorch:8083"
      CONSUMERAUTH_URL: "http://consumerauth:8082"
      HEALTH_PORT: "9004"
    depends_on:
      topic-auth-http:
        condition: service_healthy
      dynamicorch:
        condition: service_healthy
      robot-fleet:
        condition: service_healthy

  consumer-3:
    build:
      context: ../../
      dockerfile: experiments/experiment-4/dockerfiles/consumer-direct.Dockerfile
    environment:
      CONSUMER_NAME: "demo-consumer-3"
      SYSTEM_CREDENTIALS: "consumer-secret"
      CONSUMER_PASSWORD: "consumer-secret"
      AUTH_URL: "http://authentication:8081"
      ORCHESTRATION_URL: "http://dynamicorch:8083"
      CONSUMERAUTH_URL: "http://consumerauth:8082"
      HEALTH_PORT: "9005"
    depends_on:
      topic-auth-http:
        condition: service_healthy
      dynamicorch:
        condition: service_healthy
      robot-fleet:
        condition: service_healthy

  # ── Dashboard ───────────────────────────────────────────────────────────────────

  dashboard:
    build:
      context: .
      dockerfile: dockerfiles/dashboard.Dockerfile
    ports:
      - "3004:80"
    depends_on:
      - consumerauth
      - rabbitmq
      - topic-auth-http
      - robot-fleet
      - consumer-1
      - consumer-2
      - consumer-3
      - serviceregistry
      - authentication
      - dynamicorch
