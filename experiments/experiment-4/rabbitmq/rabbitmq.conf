# Single HTTP auth backend — topic-auth-http is the sole authority for all
# authentication and authorization decisions (user credentials, vhost access,
# resource operations, and topic routing-key checks).
#
# All decisions are made live against ConsumerAuthorization, so revocation
# takes effect on the next broker operation with no polling delay.
#
# The admin user (RABBITMQ_DEFAULT_USER) is handled by the HTTP backend:
# topic-auth-http recognises admin credentials and returns the
# "administrator management" tags required for management UI access.
#
auth_backends.1 = rabbit_auth_backend_http

auth_http.http_method    = post
auth_http.user_path      = http://topic-auth-http:9090/auth/user
auth_http.vhost_path     = http://topic-auth-http:9090/auth/vhost
auth_http.resource_path  = http://topic-auth-http:9090/auth/resource
auth_http.topic_path     = http://topic-auth-http:9090/auth/topic
