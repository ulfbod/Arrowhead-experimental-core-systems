# Split authn / authz model:
#
#   authn  — rabbit_auth_backend_internal
#     Validates the username and password for each connecting client using
#     RabbitMQ's built-in credential store. Consumer and publisher users are
#     pre-provisioned by the topic-auth-http reconciliation sync.
#
#   authz  — rabbit_auth_backend_http
#     Authorizes every vhost access, resource operation, and topic routing-key
#     check by calling the topic-auth-http service, which queries
#     ConsumerAuthorization live. A revoked grant is effective on the next
#     broker operation (publish or bind) — there is no polling delay.
#
# The admin user authenticates via the internal backend (RABBITMQ_DEFAULT_USER /
# RABBITMQ_DEFAULT_PASS); it is unconditionally allowed by the HTTP authz
# backend so that the management UI and admin tools continue to work.
#
auth_backends.1.authn = rabbit_auth_backend_internal
auth_backends.1.authz = rabbit_auth_backend_http

auth_http.http_method    = post
auth_http.user_path      = http://topic-auth-http:9090/auth/user
auth_http.vhost_path     = http://topic-auth-http:9090/auth/vhost
auth_http.resource_path  = http://topic-auth-http:9090/auth/resource
auth_http.topic_path     = http://topic-auth-http:9090/auth/topic
